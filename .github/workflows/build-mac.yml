name: Build & Release Noah Desktop (macOS)

# Trigger: push a tag like  noah-v1.0.1
# What it does:
#   1. Builds the Vite frontend
#   2. Packages it into a signed + notarized .dmg and .zip with electron-builder
#   3. Uploads both files to a GitHub Release
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   APPLE_CERTIFICATE          — base64-encoded Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD — password for the .p12
#   APPLE_ID                   — your Apple ID email
#   APPLE_APP_SPECIFIC_PASSWORD — app-specific password (appleid.apple.com)
#   APPLE_TEAM_ID              — 10-char Team ID (developer.apple.com → Account)
#
# Signing is skipped if the certificate secrets are absent (produces an
# unsigned DMG — useful for beta testing / internal distribution).

on:
  push:
    tags:
      - 'noah-v*'

permissions:
  contents: write        # needed to create GitHub Releases

jobs:
  build-mac:
    name: Build macOS DMG
    runs-on: macos-14    # Apple Silicon runner — fastest native M1 build
    env:
      # Evaluate secret presence at job level — can then be used in step if: conditions
      HAS_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4.2.2

      # ── 2. Node setup ───────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: artifacts/desktop/package-lock.json

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install desktop dependencies
        working-directory: artifacts/desktop
        run: npm ci

      # ── 4. Verify icon exists (committed directly to repo) ──────────────────
      - name: Verify app icon
        run: ls -lh artifacts/desktop/assets/icon.icns

      # ── 5. Import Apple Developer certificate (skipped if no secrets) ───────
      - name: Import certificate
        if: env.HAS_CERT == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -hex 20)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode -o $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> $GITHUB_ENV

      # ── 6. Build DMG (no publish — we create the release manually below) ────
      - name: Build DMG
        working-directory: artifacts/desktop
        env:
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_VERSION#noah-v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          npx electron-builder --mac --publish never

      # ── 7. Confirm build output ─────────────────────────────────────────────
      - name: List build artifacts
        working-directory: artifacts/desktop/dist
        run: ls -lh

      # ── 8. Create GitHub Release with clean notes and upload assets ─────────
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_VERSION#noah-v}"
          NOTES="## Noah Desktop ${VERSION}"$'\n\n'"Download the DMG, open it, and drag Noah to Applications."$'\n\n'"**First launch:** right-click Noah and choose Open (required once for unsigned builds)."
          # Delete existing release for this tag if it exists (idempotent retries)
          gh release delete "$RELEASE_VERSION" --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
          gh release create "$RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Noah ${VERSION}" \
            --notes "$NOTES" \
            artifacts/desktop/dist/*.dmg \
            artifacts/desktop/dist/*.zip \
            artifacts/desktop/dist/latest-mac.yml
