name: Build & Release Noah Desktop (macOS)

# Trigger: push a tag like  noah-v1.0.1
# What it does:
#   1. Builds the Vite frontend
#   2. Packages it into a signed + notarized .dmg and .zip with electron-builder
#   3. Uploads both files to a GitHub Release
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   APPLE_CERTIFICATE          — base64-encoded Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD — password for the .p12
#   APPLE_ID                   — your Apple ID email
#   APPLE_APP_SPECIFIC_PASSWORD — app-specific password (appleid.apple.com)
#   APPLE_TEAM_ID              — 10-char Team ID (developer.apple.com → Account)
#
# Signing is skipped if the certificate secrets are absent (produces an
# unsigned DMG — useful for beta testing / internal distribution).

on:
  push:
    tags:
      - 'noah-v*'

permissions:
  contents: write        # needed to create GitHub Releases

jobs:
  build-mac:
    name: Build macOS DMG
    runs-on: macos-14    # Apple Silicon runner — fastest native M1 build

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node setup ───────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: artifacts/desktop/package-lock.json

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install desktop dependencies
        working-directory: artifacts/desktop
        run: npm ci

      # ── 4. Generate icon.icns from PNG ──────────────────────────────────────
      - name: Generate app icon
        working-directory: artifacts/desktop
        run: |
          mkdir -p assets/icon.iconset
          SRC="assets/noah-logo.png"
          for SIZE in 16 32 64 128 256 512; do
            sips -z $SIZE $SIZE "$SRC" --out "assets/icon.iconset/icon_${SIZE}x${SIZE}.png" > /dev/null 2>&1
            DOUBLE=$((SIZE * 2))
            sips -z $DOUBLE $DOUBLE "$SRC" --out "assets/icon.iconset/icon_${SIZE}x${SIZE}@2x.png" > /dev/null 2>&1
          done
          iconutil -c icns assets/icon.iconset -o assets/icon.icns
          echo "icon.icns generated: $(ls -lh assets/icon.icns)"

      # ── 5. Import Apple Developer certificate (skipped if no secrets) ───────
      - name: Import certificate
        if: ${{ secrets.APPLE_CERTIFICATE != '' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -hex 20)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode -o $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> $GITHUB_ENV

      # ── 6. Build + package ──────────────────────────────────────────────────
      - name: Build and publish DMG
        working-directory: artifacts/desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_VERSION#noah-v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          npm run release

      # ── 7. Confirm ─────────────────────────────────────────────────────────
      - name: List release artifacts
        working-directory: artifacts/desktop/dist
        run: ls -lh *.dmg *.zip latest-mac.yml 2>/dev/null || true
